<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - My App</title>
    <style>
        /* Shared style from login.html for consistency */
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #218838; }
        .footer-text { text-align: center; margin-top: 20px; font-size: 14px; color: #777; }
        .footer-text a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Create Account</h2>
    <form action="/register" method="POST">
    <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="John Doe" required>
    </div>
    <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="email@example.com" required>
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a password" required>
    </div>
    <div class="form-group">
        <label>Department</label>
        <input type="text" name="department" placeholder="e.g. Engineering" required>
    </div>

    {% if error %}
        <p style="color: red; text-align: center;">{{ error }}</p>
    {% endif %}

    <button type="submit">Register Now</button>
</form>
</div>

</body>
</html>
